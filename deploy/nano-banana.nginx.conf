server {
    listen 80;
    server_name _;
    
    # 前端静态文件根目录
    root /var/www/nano-banana/dist;
    index index.html;

    # 【关键修复】使用 ^~ 提高优先级，确保 /storage/ 开头的请求
    # 直接去文件系统找，绝对不经过 Vue 路由
    location ^~ /storage/ {
        # 直接映射到服务器上的存储目录
        alias /var/www/nano-banana/storage/;
        # 如果找不到文件，返回 404，而不是 index.html
        try_files $uri $uri/ =404;
        
        # 允许跨域（可选，防止 canvas 跨域问题）
        add_header Access-Control-Allow-Origin *;
    }

    # API 转发
    location /api {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # 前端路由支持 (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
